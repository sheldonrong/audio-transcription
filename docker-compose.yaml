services:
  dtd-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
      args:
        VITE_API_BASE_URL: http://192.168.0.117:8888
        VITE_WS_URL: ws://192.168.0.117:8888
    ports:
      - "8888:8000"
    environment:
      AUDIO_DIR: /audios
      OUTPUT_DIR: /output
      WHISPER_DEVICE: rocm
      HSA_OVERRIDE_GFX_VERSION: "9.0.0"
      LD_LIBRARY_PATH: /usr/lib
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    volumes:
      - ./audios:/audios
      - ./output:/output
    restart: unless-stopped
